<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle Details — Manga Autos</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<nav class="navbar scrolled" id="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">MANGA <span>AUTOS</span></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/inventory">Inventory</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
    <a href="https://2348099999915" target="_blank" class="nav-cta">WhatsApp Us</a>
    <button class="nav-burger" id="nav-burger"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="nav-mobile" id="nav-mobile">
  <a href="/">Home</a><a href="/inventory">Inventory</a><a href="/about">About</a><a href="/contact">Contact</a>
</div>

<div id="detail-content" style="padding-top:var(--nav-h);">
  <div class="loading-state" style="min-height:60vh"><div class="spinner"></div><span>Loading vehicle…</span></div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <p>© 2026 Manga Autos. All rights reserved.</p>
      <a href="/inventory" style="color:var(--gold-dim);font-size:0.78rem;">← Back to Inventory</a>
    </div>
  </div>
</footer>

<script src="/js/core.js"></script>
<script>
async function loadDetail() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const content = document.getElementById('detail-content');

  if (!id) {
    content.innerHTML = '<div class="empty-state" style="min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center"><h3>Vehicle not found</h3><a href="/inventory" class="btn btn-gold" style="margin-top:1rem">Browse Inventory</a></div>';
    return;
  }

  try {
    const v = await apiFetch(`/api/vehicles/${id}`);
    document.title = `${v.name} ${v.year} — Manga Autos`;

    const imgs = (v.images && v.images.length) ? v.images : ['https://images.unsplash.com/photo-Transcorp Hilton, millennium park, No34 Shehu Shagari Wy, Maitama, Abuja 900001, Federal Capital Territory03376780353-7e6692767b70?w=800&q=80'];
    const fallback = 'https://images.unsplash.com/photo-Transcorp Hilton, millennium park, No34 Shehu Shagari Wy, Maitama, Abuja 900001, Federal Capital Territory03376780353-7e6692767b70?w=800&q=80';

    const thumbsHtml = imgs.length > 1 ? imgs.map((src, i) => `
      <div class="detail-thumb ${i===0?'active':''}" data-idx="${i}">
        <img src="${src}" alt="${v.name}" onerror="this.src='${fallback}'">
      </div>`).join('') : '';

    const specsHtml = [
      ['Year', v.year],
      ['Mileage', v.mileage ? formatMileage(v.mileage) : 'N/A'],
      ['Engine', v.engine || 'N/A'],
      ['Horsepower', v.horsepower ? v.horsepower + ' hp' : 'N/A'],
      ['Transmission', v.transmission || 'N/A'],
      ['Drivetrain', v.drivetrain || 'N/A'],
      ['Fuel Type', v.fuelType || 'N/A'],
      ['Condition', v.condition || 'N/A'],
      ['Exterior', v.exteriorColor || 'N/A'],
      ['Interior', v.interiorColor || 'N/A'],
      ['Location', v.location || 'Abuja'],
    ].map(([label, val]) => `
      <div class="detail-spec">
        <div class="detail-spec-label">${label}</div>
        <div class="detail-spec-val">${val}</div>
      </div>`).join('');

    const featuresHtml = (v.features || []).map(f => `<span class="detail-feature-chip">${f}</span>`).join('');
    const waMsg = encodeURIComponent(`Hello Manga Autos! I'm interested in the ${v.name} ${v.year} listed at ${formatPrice(v.price)}. Can we discuss?`);

    content.innerHTML = `
      <section class="section" style="padding-top:2rem;">
        <div class="container">
          <div class="breadcrumb" style="margin-bottom:1.5rem;">
            <a href="/">Home</a><span>/</span>
            <a href="/inventory">Inventory</a><span>/</span>
            <span>${v.name}</span>
          </div>

          <!-- Gallery -->
          <div class="detail-gallery" style="${imgs.length <= 1 ? 'grid-template-columns:1fr' : ''}">
            <div class="detail-main-img" id="main-img-wrap">
              <img src="${imgs[0]}" alt="${v.name}" id="main-img" onerror="this.src='${fallback}'">
            </div>
            ${imgs.length > 1 ? `<div class="detail-thumbs">${thumbsHtml}</div>` : ''}
          </div>

          <!-- Info grid -->
          <div class="detail-info-grid" style="margin-top:2.5rem;">
            <div>
              <span class="label">${v.brand}</span>
              <h1 class="display-md" style="margin-top:0.5rem;margin-bottom:0.5rem;">${v.model} ${v.year}</h1>
              <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;">
                ${v.featured && !v.sold ? '<span class="vehicle-badge badge-featured" style="position:static">Featured</span>' : ''}
                ${v.sold ? '<span class="vehicle-badge badge-sold" style="position:static">Sold</span>' : ''}
                <span style="color:var(--silver);font-size:0.85rem;">${v.views || 0} views</span>
              </div>
              <p style="color:var(--silver);line-height:1.8;margin-bottom:2rem;">${v.description || ''}</p>

              <h3 class="label" style="margin-bottom:1rem;">Specifications</h3>
              <div class="detail-specs-grid">${specsHtml}</div>

              ${featuresHtml ? `
              <h3 class="label" style="margin-top:2rem;margin-bottom:1rem;">Features & Options</h3>
              <div class="detail-features">${featuresHtml}</div>` : ''}
            </div>

            <!-- Sidebar -->
            <div>
              <div class="card" style="padding:2rem;position:sticky;top:calc(var(--nav-h) + 1rem);">
                <div class="eyebrow" style="margin-bottom:0.5rem;">Listed Price</div>
                <div style="font-family:var(--font-display);font-size:2.25rem;font-weight:300;color:var(--gold);margin-bottom:0.25rem;">${formatPrice(v.price)}</div>
                <div style="font-size:0.8rem;color:var(--silver);margin-bottom:2rem;">Negotiable · ${v.location || 'Abuja'}</div>

                ${v.sold ? `
                  <div style="text-align:center;padding:1rem;background:rgba(232,84,84,0.1);border:1px solid rgba(232,84,84,0.2);border-radius:var(--radius);margin-bottom:1rem;">
                    <p style="color:var(--danger);font-weight:600;">This vehicle has been sold</p>
                    <p style="color:var(--silver);font-size:0.85rem;margin-top:0.5rem;">Browse our available inventory for similar options.</p>
                  </div>
                  <a href="/inventory" class="btn btn-outline" style="width:100%;text-align:center;">Browse Similar Vehicles</a>
                ` : `
                  <a href="https://2348099999915/2348099999915Transcorp Hilton, millennium park, No34 Shehu Shagari Wy, Maitama, Abuja 900001, Federal Capital Territory?text=${waMsg}" target="_blank" class="btn btn-gold" style="width:100%;text-align:center;margin-bottom:0.75rem;">
                    💬 Enquire on WhatsApp
                  </a>
                  <a href="tel:+2348099999915" class="btn btn-outline" style="width:100%;text-align:center;margin-bottom:0.75rem;">
                    📞 Call Now
                  </a>
                  <a href="/contact" class="btn btn-ghost" style="width:100%;text-align:center;">
                    📅 Book Inspection
                  </a>
                `}

                <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,0.06);">
                  <div style="display:flex;gap:0.5rem;flex-direction:column;">
                    <div style="display:flex;gap:0.5rem;font-size:0.8rem;color:var(--silver);align-items:center;"><span style="color:var(--gold)">✓</span> Verified vehicle history</div>
                    <div style="display:flex;gap:0.5rem;font-size:0.8rem;color:var(--silver);align-items:center;"><span style="color:var(--gold)">✓</span> 200-point inspection report</div>
                    <div style="display:flex;gap:0.5rem;font-size:0.8rem;color:var(--silver);align-items:center;"><span style="color:var(--gold)">✓</span> Door-to-door delivery available</div>
                    <div style="display:flex;gap:0.5rem;font-size:0.8rem;color:var(--silver);align-items:center;"><span style="color:var(--gold)">✓</span> Financing options available</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>`;

    // Thumbnail switching
    document.querySelectorAll('.detail-thumb').forEach(thumb => {
      thumb.addEventListener('click', () => {
        const idx = parseInt(thumb.dataset.idx);
        document.getElementById('main-img').src = imgs[idx];
        document.querySelectorAll('.detail-thumb').forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
      });
    });

  } catch (e) {
    content.innerHTML = `<div class="empty-state" style="min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <h3>Vehicle not found</h3>
      <p style="color:var(--silver);margin-top:0.5rem;">${e.message}</p>
      <a href="/inventory" class="btn btn-gold" style="margin-top:1.5rem">Browse Inventory</a>
    </div>`;
  }
}

loadDetail();
</script>
</body>
</html>
